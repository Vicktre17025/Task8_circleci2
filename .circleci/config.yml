version: 2.1

orbs:
  cypress: cypress-io/cypress@3.3.1

jobs:
  cypress-tests:
    docker:
      - image: cypress/browsers:latest

    working_directory: ~/project

    steps:
      - checkout

      # Install dependencies with caching
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
            - v1-deps-

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
            - ~/.cache

      # Install Allure CLI
      - run:
          name: Install Allure
          command: |
            curl -sSL https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.zip -o allure.zip
            unzip allure.zip -d /opt/allure
            ln -sf /opt/allure/allure-2.27.0/bin/allure /usr/bin/allure

      # Run Cypress tests
      - run:
          name: Run Cypress tests
          command: npx cypress run

      # Generate Allure report
      - run:
          name: Generate Allure report
          command: npm run allure:report

      # Store Cypress artifacts (videos, screenshots)
      - store_artifacts:
          path: cypress/videos
          destination: videos

      - store_artifacts:
          path: cypress/screenshots
          destination: screenshots

      # Store Allure report
      - store_artifacts:
          path: allure-report
          destination: allure-report

workflows:
  build-and-test:
    jobs:
      - cypress-tests